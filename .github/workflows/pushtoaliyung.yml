name: Build KTransformers → Push to Aliyun ACR
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout KTransformers 官方源码
        uses: actions/checkout@v4
        with:
          repository: kvcache-ai/ktransformers
          ref: main

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # ✅ 关键：只在 YML 里覆盖 pip 源，不改 Dockerfile
      - name: 构建镜像（强制使用官方 PyPI，自动解决 kt-kernel 0.5.3）
        run: |
          docker build \
            --build-arg PIP_EXTRA_INDEX_URL=https://pypi.org/simple \
            --build-arg PIP_NO_CACHE_DIR=1 \
            -f docker/Dockerfile \
            -t crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:latest .

      - name: 推送到阿里云
        run: |
          docker push crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:latest
