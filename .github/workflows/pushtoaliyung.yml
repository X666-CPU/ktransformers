name: Build KTransformers → Push to Aliyun

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout KTransformers official repo
        uses: actions/checkout@v4
        with:
          repository: kvcache-ai/ktransformers
          ref: main
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build official KTransformers image (correct path)
        run: |
          docker build \
            --build-arg CUDA_VERSION=12.8.1 \
            -f ./docker/Dockerfile \
            -t ktransformers:official .

      - name: Tag and Push to Aliyun
        run: |
          docker tag ktransformers:official crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:latest
          docker push crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:latest
