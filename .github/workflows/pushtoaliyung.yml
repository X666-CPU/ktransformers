name: Sync KTransformers to Aliyun ACR 直接下载后推送

on:
  workflow_dispatch:  # 手动运行
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 完全和你一样的阿里云登录方式
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 拉取官方最新镜像
      - name: Pull official latest image
        run: docker pull approachingai/ktransformers:latest

      # 打标签（指向你的阿里云地址）
      - name: Tag image for Aliyun
        run: |
          docker tag approachingai/ktransformers:latest ${{ secrets.ALIYUN_REGISTRY }}/ktransformers:latest
          docker tag approachingai/ktransformers:latest ${{ secrets.ALIYUN_REGISTRY }}/ktransformers:${{ github.sha }}

      # 推送到阿里云（和你格式一致）
      - name: Push to Aliyun ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/ktransformers:latest
            ${{ secrets.ALIYUN_REGISTRY }}/ktransformers:${{ github.sha }}
