name: Build KTransformers Fork → Push to Aliyun ACR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout YOUR FORKED CODE
        uses: actions/checkout@v4
        with:
          repository: X666-CPU/ktransformers
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build Image (推理模式，关闭微调)
        run: |
          docker build \
            --build-arg CUDA_VERSION=12.8.1 \
            --build-arg FUNCTIONALITY=infer \
            -f docker/Dockerfile \
            -t crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:latest .

      - name: Push to Aliyun
        run: |
          docker push crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:latest
