services:
  ktransformers-qwen:
    image: approachingai/ktransformers:v0.5.3-cu129
    container_name: ktransformers-qwen
    restart: unless-stopped
    ipc: host
    shm_size: 32g

    ports:
      - "11435:8000"

    volumes:
      - /root/models/ktf/Qwen3.6-35B-A3B-AWQ:/models:ro
      - /root/models/ktf/ktransformers_config:/workspace/config:ro
      - /etc/localtime:/etc/localtime:ro

    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      - USE_KERNEL=1
      - KTRANSFORMERS_FORCE_CPU_EXPERTS=0
      - NVIDIA_CUDA_CACHEDIR=/tmp
      - CUDA_CACHE_MAXSIZE=2147483648

    command: >
      bash -c "
      source /opt/miniconda3/etc/profile.d/conda.sh &&
      conda activate serve &&
      pip install torchvision pillow --no-deps &&
      python -m ktransformers.local_chat
        --model_path /models
        --optimize_rule_path /workspace/config/Qwen-35B-multi-gpu.yaml
        --max_sequence_length 32768
        --keep_tokens_length 20000
        --max_new_tokens 2048
        --max_batch_size 4
        --chunked_prefill_size 2048
        --use_cuda_graph
        --gpu_mem_util 0.90
        --trust_remote_code
        --attn_optimize sdp
        --disable_log_stats
        --vision
        --max_num_images 2
      "

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0','1']
              capabilities: [gpu, compute]
