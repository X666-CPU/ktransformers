name: Build KTransformers 0.5.3 for RTX 30 Series → Push to Aliyun ACR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ktransformers official 0.5.3 code
        uses: actions/checkout@v4
        with:
          repository: approachingai/ktransformers
          ref: v0.5.3

      - name: Fix locale-gen not found error in Dockerfile
        run: |
          sed -i 's|RUN locale-gen en_US.UTF-8|RUN apt-get update && apt-get install -y --no-install-recommends locales && rm -rf /var/lib/apt/lists/* \&\& locale-gen en_US.UTF-8|' docker/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build Image for RTX 30 Series (PCIe Only, No NVLink)
        run: |
          docker build \
            --build-arg CUDA_VERSION=12.8.1 \
            --build-arg FUNCTIONALITY=infer \
            --build-arg UBUNTU_MIRROR=tsinghua \
            -f docker/Dockerfile \
            -t crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:0.5.3-30series-pcie .

      - name: Push to Aliyun ACR
        run: |
          docker push crpi-79o3tt0rozrf74vm.cn-chengdu.personal.cr.aliyuncs.com/momings/ktransformers:0.5.3-30series-pcie
